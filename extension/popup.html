<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1f2937;
      background: #f9fafb;
    }

    .header {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
    }
    .header-icon { font-size: 24px; }
    .header-title { font-size: 16px; font-weight: 700; color: #111827; }
    .header-version { font-size: 11px; color: #9ca3af; margin-left: auto; }

    .section {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      margin: 10px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 8px;
    }

    /* Connection */
    .conn-row { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; flex-shrink: 0; }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #f59e0b; }

    label { display: block; font-size: 12px; color: #374151; margin-bottom: 4px; font-weight: 500; }
    input[type="password"], input[type="text"] {
      width: 100%; padding: 8px 10px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 13px; color: #111827;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: #6366f1; }
    .btn {
      width: 100%; padding: 8px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 13px; font-weight: 600;
      transition: background 0.2s;
    }
    .btn-primary { background: #6366f1; color: white; margin-top: 8px; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn-ghost {
      background: transparent; border: 1px solid #d1d5db; color: #374151;
      font-size: 11px; padding: 6px; margin-top: 6px;
    }
    .btn-ghost:hover { background: #f3f4f6; }

    /* Status */
    #status-section {
      text-align: center; padding: 16px 10px;
      background: #f0fdf4; border: 1px solid #bbf7d0;
    }
    .status-icon { font-size: 32px; margin-bottom: 8px; }
    .status-title { font-size: 15px; font-weight: bold; color: #0284c7; margin-bottom: 4px; }
    .status-detail { font-size: 12px; color: #6b7280; min-height: 36px; padding: 0 10px; }
    .btn-row { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
    .btn-pause { font-size: 11px; padding: 6px; border-color: #fca5a5; background: white; color: #ef4444; }
    .btn-scan { font-size: 11px; padding: 6px; border-color: #93c5fd; background: white; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .stat-card { background: #f3f4f6; border-radius: 8px; padding: 8px 10px; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 700; line-height: 1; }
    .stat-num.pending { color: #f59e0b; }
    .stat-num.completed { color: #22c55e; }
    .stat-label { font-size: 10px; color: #6b7280; margin-top: 2px; }

    /* Hidden */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-icon">🤖</span>
    <span class="header-title">Amplify Auto Poster</span>
    <span class="header-version">v1.0.0</span>
  </div>

  <!-- Token section -->
  <div class="section" id="token-section">
    <div class="section-title">Kết nối tài khoản</div>
    <div class="conn-row">
      <div class="dot" id="conn-dot"></div>
      <span id="conn-text">Chưa kết nối</span>
    </div>
    <div id="token-input-group" style="margin-top:10px;">
      <label>API URL:</label>
      <input type="text" id="api-url" placeholder="https://amplify-eight-drab.vercel.app" value="https://amplify-eight-drab.vercel.app">
      <label style="margin-top:8px;">API Token:</label>
      <input type="password" id="token" placeholder="Dán token từ trang Amplify...">
      <button class="btn btn-primary" id="saveBtn">Lưu &amp; Kết nối</button>
    </div>
  </div>

  <!-- Unified Status -->
  <div class="section" id="status-section" style="display:none;">
    <div class="status-icon" id="status-icon">⏳</div>
    <div class="status-title" id="status-title">Đang tải trạng thái...</div>
    <div class="status-detail" id="status-detail">Vui lòng chờ...</div>
    <div class="btn-row">
      <button class="btn btn-ghost btn-pause" id="pauseBtn">⏸ Tạm dừng</button>
      <button class="btn btn-ghost btn-scan" id="scanBtn">🚀 Quét Ngay</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="section" id="stats-section" style="display:none;">
    <div class="section-title">Tiến độ đăng bài</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num pending" id="stat-pending">-</div>
        <div class="stat-label">⏳ Hàng chờ</div>
      </div>
      <div class="stat-card">
        <div class="stat-num completed" id="stat-completed-today">-</div>
        <div class="stat-label">✅ Hôm nay</div>
      </div>
      <div class="stat-card" style="background:#f8fafc;border:1px solid #e2e8f0;">
        <div class="stat-num" id="stat-completed-total" style="color:#64748b;font-size:18px;">-</div>
        <div class="stat-label" style="color:#64748b;">Tổng đã đăng</div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div style="text-align:center;font-size:11px;color:#9ca3af;padding:12px;line-height:1.6;">
    Amplify Auto Poster · Auto Post AI Content
  </div>

  <script src="popup.js"></script>
</body>
</html>
