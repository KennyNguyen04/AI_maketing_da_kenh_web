name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs khi push cùng branch mới — tránh waste CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Stage 1: Static checks (parallel) ────────────────────────────
  typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      GOOGLE_AI_API_KEY: ci-google-key
      INNGEST_EVENT_KEY: ci-inngest-event-key
      INNGEST_SIGNING_KEY: ci-inngest-signing-key
      TOKEN_ENCRYPTION_KEY: ci-token-encryption-key
      X_CLIENT_ID: ci-x-client-id
      X_CLIENT_SECRET: ci-x-client-secret
      X_REDIRECT_URI: http://localhost:3000/api/social/x/callback
      FACEBOOK_APP_ID: ci-facebook-app-id
      FACEBOOK_APP_SECRET: ci-facebook-app-secret
      FACEBOOK_REDIRECT_URI: http://localhost:3000/api/social/facebook/callback
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ─── Stage 2: Unit tests + coverage ────────────────────────────────
  unit-test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      GOOGLE_AI_API_KEY: ci-google-key
      INNGEST_EVENT_KEY: ci-inngest-event-key
      INNGEST_SIGNING_KEY: ci-inngest-signing-key
      TOKEN_ENCRYPTION_KEY: ci-token-encryption-key
      X_CLIENT_ID: ci-x-client-id
      X_CLIENT_SECRET: ci-x-client-secret
      X_REDIRECT_URI: http://localhost:3000/api/social/x/callback
      FACEBOOK_APP_ID: ci-facebook-app-id
      FACEBOOK_APP_SECRET: ci-facebook-app-secret
      FACEBOOK_REDIRECT_URI: http://localhost:3000/api/social/facebook/callback
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci

      # Run unit tests with JUnit output for test reporting.
      - name: Run Vitest
        run: npm run test -- --reporter=default --reporter=junit --outputFile=test-results.xml

      # Show results in PR comment / GitHub UI.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: frontend/test-results.xml

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Vitest Unit Tests
          path: frontend/test-results.xml
          reporter: jest-junit
          fail-on-error: true

  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [unit-test]
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      GOOGLE_AI_API_KEY: ci-google-key
      INNGEST_EVENT_KEY: ci-inngest-event-key
      INNGEST_SIGNING_KEY: ci-inngest-signing-key
      TOKEN_ENCRYPTION_KEY: ci-token-encryption-key
      X_CLIENT_ID: ci-x-client-id
      X_CLIENT_SECRET: ci-x-client-secret
      X_REDIRECT_URI: http://localhost:3000/api/social/x/callback
      FACEBOOK_APP_ID: ci-facebook-app-id
      FACEBOOK_APP_SECRET: ci-facebook-app-secret
      FACEBOOK_REDIRECT_URI: http://localhost:3000/api/social/facebook/callback
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: frontend/coverage/

      # Optional: upload to Codecov nếu đã add token trong repo secrets.
      # Bỏ comment nếu muốn enable:
      # - uses: codecov/codecov-action@v4
      #   with:
      #     files: frontend/coverage/coverage-final.json
      #     fail_ci_if_error: true

      # Per-file coverage gate — fail CI nếu bất kỳ file critical nào dưới threshold.
      # Xem scripts/check-coverage.mjs cho danh sách files + thresholds.
      - name: Check coverage thresholds
        run: node scripts/check-coverage.mjs

  # ─── Stage 3: Build ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [coverage]
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      GOOGLE_AI_API_KEY: ci-google-key
      INNGEST_EVENT_KEY: ci-inngest-event-key
      INNGEST_SIGNING_KEY: ci-inngest-signing-key
      TOKEN_ENCRYPTION_KEY: ci-token-encryption-key
      X_CLIENT_ID: ci-x-client-id
      X_CLIENT_SECRET: ci-x-client-secret
      X_REDIRECT_URI: http://localhost:3000/api/social/x/callback
      FACEBOOK_APP_ID: ci-facebook-app-id
      FACEBOOK_APP_SECRET: ci-facebook-app-secret
      FACEBOOK_REDIRECT_URI: http://localhost:3000/api/social/facebook/callback
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
